<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Washiq Adnan | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
/* --- BASE STYLES --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }

/* --- VIDEO STYLE RADIAL LOADER --- */
#loader-wrapper {
    position: fixed; inset: 0; background: #000; z-index: 9999;
    display: flex; justify-content: center; align-items: center;
}

.gold-border-frame {
    width: 320px; height: 320px;
    border: 2px solid #ffd700; border-radius: 20px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
    background: rgba(5, 5, 5, 0.9);
    position: relative;
}

/* Canvas for the exact video effect */
#radialCanvas { width: 200px; height: 200px; }

.percent-text {
    position: absolute;
    font-family: 'Share Tech Mono', monospace;
    font-size: 24px; color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
}

.server-msg {
    margin-top: 15px; font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: #ffd700; letter-spacing: 2px;
    animation: blink 1s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Main Content Hidden Initially */
#main-content { opacity: 0; transition: opacity 1.5s ease; visibility: hidden; }
.fade-out { opacity: 0; visibility: hidden; transition: 1s; }

/* --- UI STYLES (MATCHING YOUR THEME) --- */
.container { padding: 50px 20px; text-align: center; }
.profile-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #00d4ff; box-shadow: 0 0 20px #00d4ff; }
h1 { margin-top: 20px; font-size: 28px; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 30px auto; }
.btn { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; padding: 15px; border-radius: 10px; color: #fff; cursor: pointer; }
</style>
</head>
<body>

<div id="loader-wrapper">
    <div class="gold-border-frame">
        <canvas id="radialCanvas" width="400" height="400"></canvas>
        <div class="percent-text" id="percent">0%</div>
        <div class="server-msg">SYSTEM INITIALIZING...</div>
    </div>
</div>

<div id="main-content">
    <div class="container">
        <img src="https://files.catbox.moe/8ca69l.jpeg" class="profile-img">
        <h1>Washiq Adnan</h1>
        <p style="color:#00d4ff">Python & Node.js Expert</p>
        
        <div class="btn-grid">
            <div class="btn">Profession</div>
            <div class="btn">Education</div>
            <div class="btn">Raha AI</div>
            <div class="btn">Contact</div>
        </div>
        <p style="font-size: 10px; opacity: 0.4; margin-top: 50px;">© 2026 WASHIQ ADNAN | CHILL & CODE</p>
    </div>
</div>

<script>
const canvas = document.getElementById('radialCanvas');
const ctx = canvas.getContext('2d');
const percentEl = document.getElementById('percent');
let progress = 0;

function drawRadialLoader() {
    ctx.clearRect(0, 0, 400, 400);
    const centerX = 200;
    const centerY = 200;
    const maxLines = 25; // Number of concentric rings
    
    for (let i = 0; i < maxLines; i++) {
        let radius = 50 + (i * 6);
        let angleLimit = (progress / 100) * (Math.PI * 1.5); // 270 degree arc like video
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, -Math.PI / 2, -Math.PI / 2 + angleLimit);
        ctx.strokeStyle = `rgba(0, 255, 255, ${1 - i/maxLines})`; // Fading neon effect
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    if (progress < 100) {
        progress += 0.8; // Control speed
        percentEl.innerText = Math.floor(progress) + "%";
        requestAnimationFrame(drawRadialLoader);
    } else {
        setTimeout(showSite, 500);
    }
}

function showSite() {
    document.getElementById('loader-wrapper').classList.add('fade-out');
    const main = document.getElementById('main-content');
    main.style.visibility = "visible";
    main.style.opacity = "1";
}

// Start the animation
drawRadialLoader();
</script>

</body>
</html>
